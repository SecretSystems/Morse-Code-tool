<!DOCTYPE html>
<html>
<head>
<title>Morse Code Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top,#3a3527 0%,#17140f 45%,#070604 100%);
  color:#f2e6c9;
  font-family:Georgia, "Times New Roman", serif;
  text-align:center;
  padding:12px;
}
h1{
  margin:8px 0 4px;
  font-size:30px;
  letter-spacing:6px;
  color:#ead8aa;
  text-shadow:0 2px 4px #000;
}
#subtitle{
  color:#aa9564;
  font-size:14px;
  letter-spacing:2px;
  margin-bottom:8px;
}
#current{
  display:inline-block;
  min-width:260px;
  padding:10px 16px;
  margin:8px 0 12px;
  font-size:28px;
  color:#2cff5a;
  background:#070906;
  border:2px solid #8d7440;
  border-radius:8px;
  box-shadow:inset 0 0 18px #000,0 0 10px #000;
  font-family:"Courier New", monospace;
}
#boardWrap{
  width:100%;
  overflow-x:auto;
}
svg{
  width:100%;
  max-width:760px;
  height:760px;
  background:
    linear-gradient(145deg,#161d18,#060806);
  border:8px solid #6b542c;
  border-radius:18px;
  box-shadow:
    inset 0 0 35px #000,
    0 12px 35px #000;
}
.line{
  stroke:#bca773;
  stroke-width:5;
  stroke-linecap:round;
  opacity:.9;
}
.node{
  fill:#172218;
  stroke:#d7c28a;
  stroke-width:4;
}
.active{
  fill:#2cff5a;
  stroke:#eaffc7;
  filter:drop-shadow(0 0 12px #2cff5a);
}
.letter{
  fill:#fff3cf;
  font-size:24px;
  font-weight:900;
  text-anchor:middle;
  dominant-baseline:middle;
  pointer-events:none;
  font-family:"Courier New", monospace;
}
#morseKey{
  color:#c9b37c;
  margin:8px 0;
  font-family:"Courier New", monospace;
}
button{
  margin-top:14px;
  width:175px;
  height:175px;
  border-radius:50%;
  border:6px solid #6b542c;
  background:
    radial-gradient(circle,#d0b46c 0%,#8a6d32 55%,#3d2d13 100%);
  color:#111;
  font-size:25px;
  font-weight:bold;
  touch-action:none;
  box-shadow:
    inset 0 0 18px #fff2,
    0 0 0 4px #1a1208,
    0 12px 28px #000;
}
button:active{
  transform:scale(.97);
  filter:brightness(1.25);
}
p{
  color:#c9b37c;
  margin:10px 0;
  font-size:15px;
}
</style>
</head>
<body>

<h1>MORSE CODE</h1>
<div id="subtitle">FIELD TRAINING BOARD</div>
<div id="current">Start</div>

<div id="boardWrap">
  <svg viewBox="0 0 760 760" id="board"></svg>
</div>

<div id="morseKey">DOT = tap • DASH = hold</div>
<button id="btn">KEY</button>
<p>Release the key, then pause to finish the letter.</p>

<script>
const morseMap = {
  ".":"E","-":"T",
  "..":"I",".-":"A","-.":"N","--":"M",
  "...":"S","..-":"U",".-.":"R",".--":"W",
  "-..":"D","-.-":"K","--.":"G","---":"O",
  "....":"H","...-":"V","..-.":"F",".-..":"L",
  ".--.":"P",".---":"J","-...":"B","-..-":"X",
  "-.-.":"C","-.--":"Y","--..":"Z","--.-":"Q"
};

const nodes = {
  "":     [380,60,"●","circle"],

  "-":    [260,60,"T","box"],
  "--":   [150,60,"M","box"],
  "---":  [55,60,"O","box"],
  "--.":  [150,185,"G","circle"],
  "--.-": [55,185,"Q","box"],
  "--..": [150,305,"Z","circle"],

  "-.":   [260,425,"N","circle"],
  "-.-":  [150,425,"K","box"],
  "-.--": [55,425,"Y","box"],
  "-.-.": [150,545,"C","circle"],
  "-..":  [260,555,"D","circle"],
  "-..-": [150,665,"X","box"],
  "-...": [260,665,"B","circle"],

  ".":    [500,60,"E","circle"],
  "..":   [610,60,"I","circle"],
  "...":  [705,60,"S","circle"],
  "....": [705,185,"H","circle"],
  "...-": [610,185,"V","box"],

  "..-":  [500,185,"U","box"],
  "..-.": [500,305,"F","circle"],

  ".-":   [500,425,"A","box"],
  ".-.":  [610,425,"R","circle"],
  ".-..": [705,425,"L","circle"],

  ".--":  [500,555,"W","box"],
  ".--.": [610,555,"P","circle"],
  ".---": [500,665,"J","box"]
};

const connections = [
  ["","-"],["-","--"],["--","---"],["--","--."],["--.","--.-"],["--.","--.."],
  ["-","-."],["-.","-.-"],["-.-","-.--"],["-.-","-.-."],["-.","-.."],["-..","-..-"],["-..","-..."],
  ["","."],[".",".."],["..","..."],["...","...."],["...","...-"],
  ["..","..-"],["..-","..-."],
  [".",".-"],[".-",".-."],[".-.",".-.."],
  [".-",".--"],[".--",".--."],[".--",".---"]
];

let morse = "";
let pressStart = 0;
let timer;
let audioCtx;
let oscillator;
let gain;

const board = document.getElementById("board");
const current = document.getElementById("current");
const btn = document.getElementById("btn");

function draw(){
  board.innerHTML = "";

  board.innerHTML += `
    <rect x="16" y="16" width="728" height="728" rx="14" fill="none" stroke="#2b2111" stroke-width="4"/>
    <text x="170" y="735" fill="#7e6a3d" font-size="18" font-family="Courier New">DASH SIDE</text>
    <text x="500" y="735" fill="#7e6a3d" font-size="18" font-family="Courier New">DOT SIDE</text>
  `;

  for(const [a,b] of connections){
    const [x1,y1] = nodes[a];
    const [x2,y2] = nodes[b];
    board.innerHTML += `<line class="line" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
  }

  for(const code in nodes){
    const [x,y,label,type] = nodes[code];
    const id = code === "" ? "start" : code;

    if(type === "box"){
      board.innerHTML += `<rect id="node-${id}" class="node" x="${x-34}" y="${y-25}" width="68" height="50" rx="7"/>`;
    } else {
      board.innerHTML += `<circle id="node-${id}" class="node" cx="${x}" cy="${y}" r="32"/>`;
    }

    board.innerHTML += `<text class="letter" x="${x}" y="${y}">${label}</text>`;
  }
}

function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function startTone(){
  ensureAudio();

  stopTone();

  oscillator = audioCtx.createOscillator();
  gain = audioCtx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.value = 700;

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.45, now + 0.01);

  oscillator.start(now);
}

function stopTone(){
  if(oscillator && gain){
    const now = audioCtx.currentTime;
    gain.gain.cancelScheduledValues(now);
    gain.gain.setValueAtTime(gain.gain.value, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.025);
    oscillator.stop(now + 0.03);
  }

  oscillator = null;
  gain = null;
}

function speak(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

function update(){
  document.querySelectorAll(".node").forEach(n => n.classList.remove("active"));

  const id = morse ? "node-" + morse : "node-start";
  const node = document.getElementById(id);
  if(node) node.classList.add("active");

  if(!morse){
    current.textContent = "Start";
    return;
  }

  const letter = morseMap[morse];
  current.textContent = letter ? `${morse} = ${letter}` : `${morse} = keep going`;
}

function finish(){
  const letter = morseMap[morse] || "?";
  current.textContent = "Letter: " + letter;
  speak(letter === "?" ? "Unknown" : letter);

  setTimeout(()=>{
    morse = "";
    update();
  },950);
}

function start(e){
  e.preventDefault();
  clearTimeout(timer);
  pressStart = Date.now();
  startTone();
}

function end(e){
  e.preventDefault();

  stopTone();

  const length = Date.now() - pressStart;

  if(length < 300){
    morse += ".";
  } else {
    morse += "-";
  }

  if(morse.length > 4){
    morse = "";
    current.textContent = "Too long. Start again.";
    update();
    return;
  }

  update();
  timer = setTimeout(finish, 1100);
}

draw();
update();

btn.addEventListener("mousedown", start);
btn.addEventListener("mouseup", end);
btn.addEventListener("mouseleave", e => {
  if(pressStart) end(e);
});

btn.addEventListener("touchstart", start, {passive:false});
btn.addEventListener("touchend", end, {passive:false});
btn.addEventListener("touchcancel", end, {passive:false});
</script>

</body>
</html>
