<!DOCTYPE html>
<html>
<head>
<title>Morse Code Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:#061018;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:10px;
}
h1{
  margin:8px 0;
  font-size:28px;
  letter-spacing:4px;
}
#current{
  font-size:30px;
  color:#39ff63;
  margin:8px 0 12px;
  min-height:38px;
}
svg{
  width:100%;
  max-width:560px;
  height:720px;
  background:#08131d;
  border:3px solid #b7d5df;
  border-radius:18px;
  box-shadow:0 0 25px #000;
}
.line{
  stroke:#b7d5df;
  stroke-width:5;
  stroke-linecap:round;
}
.node{
  fill:#182a24;
  stroke:#d8f4ff;
  stroke-width:4;
}
.active{
  fill:#39ff63;
  filter:drop-shadow(0 0 10px #39ff63);
}
.letter{
  fill:white;
  font-size:21px;
  font-weight:700;
  text-anchor:middle;
  dominant-baseline:middle;
  pointer-events:none;
}
button{
  margin-top:12px;
  width:165px;
  height:165px;
  border-radius:50%;
  border:0;
  background:#39ff63;
  font-size:24px;
  font-weight:bold;
  touch-action:none;
  box-shadow:0 0 30px #39ff63;
}
p{color:#c7d6dd;margin:8px 0;}
</style>
</head>
<body>

<h1>MORSE CODE</h1>
<div id="current">Start</div>

<svg viewBox="0 0 560 720" id="board"></svg>

<button id="btn">PRESS</button>
<p>Tap = dot • Hold = dash • Pause = finish</p>

<script>
const morseMap = {
  ".":"E","-":"T",
  "..":"I",".-":"A","-.":"N","--":"M",
  "...":"S","..-":"U",".-.":"R",".--":"W",
  "-..":"D","-.-":"K","--.":"G","---":"O",
  "....":"H","...-":"V","..-.":"F",".-..":"L",
  ".--.":"P",".---":"J","-...":"B","-..-":"X",
  "-.-.":"C","-.--":"Y","--..":"Z","--.-":"Q"
};

const nodes = {
  "": [280,60,"START","circle"],

  "-": [180,60,"T","box"],
  "--": [105,60,"M","box"],
  "---": [40,60,"O","box"],
  "--.": [105,170,"G","circle"],
  "--.-": [40,170,"Q","box"],
  "--..": [105,280,"Z","circle"],

  "-.": [180,400,"N","circle"],
  "-.-": [105,400,"K","box"],
  "-.--": [40,400,"Y","box"],
  "-.-.": [105,515,"C","circle"],
  "-..": [180,545,"D","circle"],
  "-..-": [105,545,"X","box"],
  "-...": [180,650,"B","circle"],

  ".": [340,60,"E","circle"],
  "..": [415,60,"I","circle"],
  "...": [490,60,"S","circle"],
  "....": [540,60,"H","circle"],
  "...-": [490,170,"V","box"],

  "..-": [415,170,"U","box"],
  "..-.": [415,280,"F","circle"],

  ".-": [340,400,"A","box"],
  ".-.": [415,400,"R","circle"],
  ".-..": [490,400,"L","circle"],

  ".--": [340,545,"W","box"],
  ".--.": [415,545,"P","circle"],
  ".---": [340,650,"J","box"]
};

const connections = [
  ["","-"],["-","--"],["--","---"],["--","--."],["--.","--.-"],["--.","--.."],
  ["-","-."],["-.","-.-"],["-.-","-.--"],["-.-","-.-."],["-.","-.."],["-..","-..-"],["-..","-..."],

  ["","."],[".",".."],["..","..."],["...","...."],["...","...-"],
  ["..","..-"],["..-","..-."],
  [".",".-"],[".-",".-."],[".-.",".-.."],
  [".-",".--"],[".--",".--."],[".--",".---"]
];

let morse = "";
let pressStart = 0;
let timer;
let audioCtx;

const board = document.getElementById("board");
const current = document.getElementById("current");
const btn = document.getElementById("btn");

function draw(){
  board.innerHTML = "";

  for(const [a,b] of connections){
    const [x1,y1] = nodes[a];
    const [x2,y2] = nodes[b];
    board.innerHTML += `<line class="line" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
  }

  for(const code in nodes){
    const [x,y,label,type] = nodes[code];
    const id = code === "" ? "start" : code;

    if(type === "box"){
      board.innerHTML += `<rect id="node-${id}" class="node" x="${x-27}" y="${y-22}" width="54" height="44" rx="7"/>`;
    } else {
      board.innerHTML += `<circle id="node-${id}" class="node" cx="${x}" cy="${y}" r="27"/>`;
    }

    board.innerHTML += `<text class="letter" x="${x}" y="${y}">${label}</text>`;
  }
}

function playMorseTone(seconds){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.value = 700;

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.35, now + 0.01);
  gain.gain.setValueAtTime(0.35, now + seconds);
  gain.gain.linearRampToValueAtTime(0, now + seconds + 0.03);

  oscillator.start(now);
  oscillator.stop(now + seconds + 0.04);
}

function speak(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function update(){
  document.querySelectorAll(".node").forEach(n => n.classList.remove("active"));

  const id = morse ? "node-" + morse : "node-start";
  const node = document.getElementById(id);
  if(node) node.classList.add("active");

  if(!morse){
    current.textContent = "Start";
    return;
  }

  const letter = morseMap[morse];
  current.textContent = letter ? `${morse} = ${letter}` : `${morse} = keep going`;
}

function finish(){
  const letter = morseMap[morse] || "?";
  current.textContent = "Letter: " + letter;
  speak(letter === "?" ? "Unknown" : letter);

  setTimeout(()=>{
    morse = "";
    update();
  },900);
}

function start(e){
  e.preventDefault();
  clearTimeout(timer);
  pressStart = Date.now();
}

function end(e){
  e.preventDefault();

  const length = Date.now() - pressStart;

  if(length < 300){
    morse += ".";
    playMorseTone(0.10);
  } else {
    morse += "-";
    playMorseTone(0.30);
  }

  if(morse.length > 4){
    morse = "";
    current.textContent = "Too long. Start again.";
    update();
    return;
  }

  update();
  timer = setTimeout(finish, 1100);
}

draw();
update();

btn.addEventListener("mousedown", start);
btn.addEventListener("mouseup", end);
btn.addEventListener("touchstart", start);
btn.addEventListener("touchend", end);
</script>

</body>
</html>
