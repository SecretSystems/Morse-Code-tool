<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Morse Trainer</title>

<style>
*{
  box-sizing:border-box;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#120d07;
  color:#f5dfad;
  font-family:Georgia,serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  width:100vw;
  height:100svh;
  padding:8px;
  display:grid;
  grid-template-rows:auto auto 1fr auto;
  gap:6px;
  background:radial-gradient(circle at top,#3b2c18,#130d06 58%,#050302);
}

h1{
  margin:0;
  font-size:clamp(18px,5vw,28px);
  letter-spacing:4px;
  text-align:center;
  color:#f3d58c;
}

#current{
  justify-self:center;
  min-width:230px;
  padding:6px 12px;
  font-size:clamp(18px,5vw,26px);
  color:#35ff5d;
  background:#050704;
  border:2px solid #9f8144;
  border-radius:8px;
  font-family:"Courier New",monospace;
  text-align:center;
  box-shadow:inset 0 0 12px #000;
}

.boardBox{
  min-height:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

svg{
  width:100%;
  height:100%;
  max-width:540px;
  max-height:100%;
  background:linear-gradient(145deg,#1b2419,#070805);
  border:5px solid #6f5428;
  border-radius:14px;
  box-shadow:inset 0 0 25px #000,0 8px 24px #000;
}

.line{
  stroke:#bda66a;
  stroke-width:4;
  stroke-linecap:round;
}

.node{
  fill:#182416;
  stroke:#e0c37a;
  stroke-width:3;
}

.active{
  fill:#35ff5d;
  stroke:#f5ffd2;
  filter:drop-shadow(0 0 8px #35ff5d);
}

.letter{
  fill:#fff1bd;
  font-size:22px;
  font-weight:900;
  text-anchor:middle;
  dominant-baseline:middle;
  font-family:"Courier New",monospace;
  pointer-events:none;
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  padding-bottom:env(safe-area-inset-bottom);
}

button{
  border:4px solid #6f5428;
  background:radial-gradient(circle,#e5c673,#8d6a2d 58%,#35230d);
  color:#111;
  font-weight:900;
  box-shadow:inset 0 0 12px #fff3,0 6px 18px #000;
  touch-action:none;
}

#keyBtn{
  width:104px;
  height:104px;
  border-radius:50%;
  font-size:24px;
}

#resetBtn{
  height:52px;
  padding:0 14px;
  border-radius:10px;
  font-size:14px;
}

button:active{
  transform:scale(.96);
  filter:brightness(1.25);
}
</style>
</head>

<body>
<div class="app">
  <h1>MORSE CODE</h1>

  <div id="current">Start</div>

  <div class="boardBox">
    <svg viewBox="0 0 540 620" id="board"></svg>
  </div>

  <div class="controls">
    <button id="resetBtn">RESET</button>
    <button id="keyBtn">KEY</button>
  </div>
</div>

<script>
const morseMap={
  ".":"E","-":"T","..":"I",".-":"A","-.":"N","--":"M",
  "...":"S","..-":"U",".-.":"R",".--":"W","-..":"D","-.-":"K","--.":"G","---":"O",
  "....":"H","...-":"V","..-.":"F",".-..":"L",".--.":"P",".---":"J",
  "-...":"B","-..-":"X","-.-.":"C","-.--":"Y","--..":"Z","--.-":"Q"
};

const nodes={

  "":[270,45,"●","circle"],

  "-":[185,45,"T","box"],
  "--":[110,45,"M","box"],
  "---":[45,45,"O","box"],
  "--.":[110,145,"G","circle"],
  "--.-":[45,145,"Q","box"],
  "--..":[110,245,"Z","circle"],

  "-.":[185,345,"N","circle"],
  "-.-":[110,345,"K","box"],
  "-.--":[45,345,"Y","box"],
  "-.-.":[110,445,"C","circle"],
  "-..":[185,460,"D","circle"],
  "-..-":[110,555,"X","box"],
  "-...":[185,555,"B","circle"],

  ".":[355,45,"E","circle"],

  "..":[455,100,"I","circle"],
  "...":[500,205,"S","circle"],
  "....":[500,305,"H","circle"],
  "...-":[455,305,"V","box"],

  "..-":[395,225,"U","box"],
  "..-.":[395,330,"F","circle"],

  ".-":[315,405,"A","box"],
  ".-.":[430,405,"R","circle"],
  ".-..":[495,505,"L","circle"],

  ".--":[315,505,"W","box"],
  ".--.":[430,555,"P","circle"],
  ".---":[315,555,"J","box"]
};

const connections=[
  ["","-"],["-","--"],["--","---"],["--","--."],["--.","--.-"],["--.","--.."],
  ["-","-."],["-.","-.-"],["-.-","-.--"],["-.-","-.-."],["-.","-.."],["-..","-..-"],["-..","-..."],

  ["","."],[".",".."],["..","..."],["...","...."],["...","...-"],
  ["..","..-"],["..-","..-."],

  [".",".-"],[".-",".-."],[".-.",".-.."],
  [".-",".--"],[".--",".--."],[".--",".---"]
];

let morse="";
let pressStart=0;
let timer=null;
let audioCtx=null;
let osc=null;
let gain=null;
let soundReady=false;
let isPressing=false;

const board=document.getElementById("board");
const current=document.getElementById("current");
const keyBtn=document.getElementById("keyBtn");
const resetBtn=document.getElementById("resetBtn");

function draw(){

  board.innerHTML="";

  board.innerHTML+=`
    <rect x="12" y="12" width="516" height="596" rx="12"
    fill="none"
    stroke="#2d2110"
    stroke-width="3"/>
  `;

  for(const [a,b] of connections){

    const [x1,y1]=nodes[a];
    const [x2,y2]=nodes[b];

    board.innerHTML+=`
      <line class="line"
      x1="${x1}"
      y1="${y1}"
      x2="${x2}"
      y2="${y2}"/>
    `;
  }

  for(const code in nodes){

    const [x,y,label,type]=nodes[code];
    const id=code===""?"start":code;

    if(type==="box"){

      board.innerHTML+=`
        <rect
        id="node-${id}"
        class="node"
        x="${x-27}"
        y="${y-20}"
        width="54"
        height="40"
        rx="7"/>
      `;

    }else{

      board.innerHTML+=`
        <circle
        id="node-${id}"
        class="node"
        cx="${x}"
        cy="${y}"
        r="27"/>
      `;
    }

    board.innerHTML+=`
      <text
      class="letter"
      x="${x}"
      y="${y}">
      ${label}
      </text>
    `;
  }
}

async function unlockSoundIfNeeded(){

  if(soundReady && audioCtx) return;

  audioCtx=new(window.AudioContext||window.webkitAudioContext)();

  await audioCtx.resume();

  soundReady=true;
}

function startTone(){

  if(!soundReady||!audioCtx)return;

  stopTone();

  osc=audioCtx.createOscillator();
  gain=audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=720;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const now=audioCtx.currentTime;

  gain.gain.setValueAtTime(0,now);
  gain.gain.linearRampToValueAtTime(0.9,now+0.01);

  osc.start(now);
}

function stopTone(){

  if(!osc||!gain||!audioCtx)return;

  const now=audioCtx.currentTime;

  gain.gain.cancelScheduledValues(now);
  gain.gain.setValueAtTime(0.9,now);
  gain.gain.linearRampToValueAtTime(0,now+0.025);

  osc.stop(now+0.03);

  osc=null;
  gain=null;
}

function speak(text){

  speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);

  u.rate=.85;

  speechSynthesis.speak(u);
}

function update(){

  document
  .querySelectorAll(".node")
  .forEach(n=>n.classList.remove("active"));

  const id=morse ? "node-"+morse : "node-start";

  const node=document.getElementById(id);

  if(node)node.classList.add("active");

  if(!morse){

    current.textContent="Start";
    return;
  }

  const letter=morseMap[morse];

  current.textContent=
    letter
    ? `${morse} = ${letter}`
    : `${morse} = keep going`;
}

function finish(){

  const letter=morseMap[morse] || "?";

  current.textContent="Letter: "+letter;

  speak(letter==="?" ? "Unknown" : letter);

  setTimeout(()=>{

    morse="";
    update();

  },850);
}

async function startPress(e){

  e.preventDefault();

  await unlockSoundIfNeeded();

  clearTimeout(timer);

  isPressing=true;

  pressStart=Date.now();

  startTone();
}

function endPress(e){

  e.preventDefault();

  if(!isPressing)return;

  isPressing=false;

  stopTone();

  const held=Date.now()-pressStart;

  morse += held < 300 ? "." : "-";

  if(morse.length>4){

    morse="";

    current.textContent="Too long";

    update();

    return;
  }

  update();

  timer=setTimeout(finish,1000);
}

function reset(){

  morse="";

  clearTimeout(timer);

  stopTone();

  isPressing=false;

  update();
}

draw();
update();

resetBtn.addEventListener("click",reset);

keyBtn.addEventListener("pointerdown",startPress);
keyBtn.addEventListener("pointerup",endPress);
keyBtn.addEventListener("pointerleave",endPress);
keyBtn.addEventListener("pointercancel",endPress);
</script>
</body>
</html>
