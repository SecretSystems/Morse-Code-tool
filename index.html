<!DOCTYPE html>
<html>
<head>
<title>Morse Code Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#3b3322,#14100a 55%,#050403);
  color:#f3e3bd;
  font-family:Georgia,"Times New Roman",serif;
  text-align:center;
  padding:12px;
}
h1{
  margin:8px 0 4px;
  font-size:30px;
  letter-spacing:6px;
  color:#efd9a2;
}
#subtitle{
  color:#b79b5d;
  font-size:14px;
  letter-spacing:2px;
  margin-bottom:8px;
}
#current{
  display:inline-block;
  min-width:270px;
  padding:10px 16px;
  margin:8px 0 12px;
  font-size:28px;
  color:#33ff5e;
  background:#060806;
  border:2px solid #8d7440;
  border-radius:8px;
  font-family:"Courier New",monospace;
  box-shadow:inset 0 0 18px #000,0 0 10px #000;
}
#boardWrap{
  width:100%;
  overflow-x:auto;
}
svg{
  width:100%;
  max-width:820px;
  height:780px;
  background:linear-gradient(145deg,#182018,#060806);
  border:8px solid #6b542c;
  border-radius:18px;
  box-shadow:inset 0 0 35px #000,0 12px 35px #000;
}
.line{
  stroke:#bca773;
  stroke-width:5;
  stroke-linecap:round;
  opacity:.9;
}
.node{
  fill:#172218;
  stroke:#d7c28a;
  stroke-width:4;
}
.active{
  fill:#33ff5e;
  stroke:#eaffc7;
  filter:drop-shadow(0 0 12px #33ff5e);
}
.letter{
  fill:#fff2c6;
  font-size:25px;
  font-weight:900;
  text-anchor:middle;
  dominant-baseline:middle;
  pointer-events:none;
  font-family:"Courier New",monospace;
}
button{
  margin:10px 6px;
  border:6px solid #6b542c;
  background:radial-gradient(circle,#d4ba72 0%,#8a6d32 55%,#3d2d13 100%);
  color:#111;
  font-weight:bold;
  touch-action:none;
  box-shadow:inset 0 0 18px #fff2,0 0 0 4px #1a1208,0 12px 28px #000;
}
#soundBtn{
  width:auto;
  height:auto;
  border-radius:10px;
  padding:14px 18px;
  font-size:16px;
}
#btn{
  width:175px;
  height:175px;
  border-radius:50%;
  font-size:25px;
}
button:active{
  transform:scale(.97);
  filter:brightness(1.25);
}
p{
  color:#c9b37c;
  margin:10px 0;
  font-size:15px;
}
</style>
</head>

<body>

<h1>MORSE CODE</h1>
<div id="subtitle">FIELD TRAINING BOARD</div>
<div id="current">Start</div>

<div id="boardWrap">
  <svg viewBox="0 0 820 780" id="board"></svg>
</div>

<button id="soundBtn">ENABLE SOUND</button>
<button id="btn">KEY</button>

<p>Tap = dot • Hold = dash • Release, then pause to finish the letter.</p>

<script>
const morseMap = {
  ".":"E","-":"T",
  "..":"I",".-":"A","-.":"N","--":"M",
  "...":"S","..-":"U",".-.":"R",".--":"W",
  "-..":"D","-.-":"K","--.":"G","---":"O",
  "....":"H","...-":"V","..-.":"F",".-..":"L",
  ".--.":"P",".---":"J","-...":"B","-..-":"X",
  "-.-.":"C","-.--":"Y","--..":"Z","--.-":"Q"
};

const nodes = {
  "":     [410,70,"●","circle"],

  "-":    [285,70,"T","box"],
  "--":   [170,70,"M","box"],
  "---":  [70,70,"O","box"],
  "--.":  [170,205,"G","circle"],
  "--.-": [70,205,"Q","box"],
  "--..": [170,340,"Z","circle"],

  "-.":   [285,465,"N","circle"],
  "-.-":  [170,465,"K","box"],
  "-.--": [70,465,"Y","box"],
  "-.-.": [170,600,"C","circle"],
  "-..":  [285,600,"D","circle"],
  "-..-": [170,720,"X","box"],
  "-...": [285,720,"B","circle"],

  ".":    [535,70,"E","circle"],
  "..":   [650,115,"I","circle"],
  "...":  [760,115,"S","circle"],
  "....": [760,255,"H","circle"],
  "...-": [650,255,"V","box"],

  "..-":  [535,255,"U","box"],
  "..-.": [535,390,"F","circle"],

  ".-":   [535,465,"A","box"],
  ".-.":  [650,465,"R","circle"],
  ".-..": [760,465,"L","circle"],

  ".--":  [535,600,"W","box"],
  ".--.": [650,600,"P","circle"],
  ".---": [535,720,"J","box"]
};

const connections = [
  ["","-"],["-","--"],["--","---"],["--","--."],["--.","--.-"],["--.","--.."],
  ["-","-."],["-.","-.-"],["-.-","-.--"],["-.-","-.-."],["-.","-.."],["-..","-..-"],["-..","-..."],
  ["","."],[".",".."],["..","..."],["...","...."],["...","...-"],
  ["..","..-"],["..-","..-."],
  [".",".-"],[".-",".-."],[".-.",".-.."],
  [".-",".--"],[".--",".--."],[".--",".---"]
];

let morse = "";
let pressStart = 0;
let timer;
let audioCtx = null;
let oscillator = null;
let gain = null;
let soundEnabled = false;

const board = document.getElementById("board");
const current = document.getElementById("current");
const btn = document.getElementById("btn");
const soundBtn = document.getElementById("soundBtn");

function draw(){
  board.innerHTML = "";

  board.innerHTML += `
    <rect x="18" y="18" width="784" height="744" rx="14" fill="none" stroke="#2b2111" stroke-width="4"/>
    <text x="165" y="755" fill="#7e6a3d" font-size="18" font-family="Courier New">DASH SIDE</text>
    <text x="545" y="755" fill="#7e6a3d" font-size="18" font-family="Courier New">DOT SIDE</text>
  `;

  for(const [a,b] of connections){
    const [x1,y1] = nodes[a];
    const [x2,y2] = nodes[b];
    board.innerHTML += `<line class="line" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
  }

  for(const code in nodes){
    const [x,y,label,type] = nodes[code];
    const id = code === "" ? "start" : code;

    if(type === "box"){
      board.innerHTML += `<rect id="node-${id}" class="node" x="${x-36}" y="${y-27}" width="72" height="54" rx="8"/>`;
    } else {
      board.innerHTML += `<circle id="node-${id}" class="node" cx="${x}" cy="${y}" r="34"/>`;
    }

    board.innerHTML += `<text class="letter" x="${x}" y="${y}">${label}</text>`;
  }
}

async function enableSound(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();
  soundEnabled = true;
  soundBtn.textContent = "SOUND ON";
  testBeep();
}

function testBeep(){
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 700;

  osc.connect(g);
  g.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.5, now + 0.01);
  g.gain.linearRampToValueAtTime(0, now + 0.18);

  osc.start(now);
  osc.stop(now + 0.2);
}

function startTone(){
  if(!soundEnabled || !audioCtx) return;

  stopTone();

  oscillator = audioCtx.createOscillator();
  gain = audioCtx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.value = 700;

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.6, now + 0.01);

  oscillator.start(now);
}

function stopTone(){
  if(!oscillator || !gain || !audioCtx) return;

  const now = audioCtx.currentTime;
  gain.gain.cancelScheduledValues(now);
  gain.gain.setValueAtTime(0.6, now);
  gain.gain.linearRampToValueAtTime(0, now + 0.03);

  oscillator.stop(now + 0.04);

  oscillator = null;
  gain = null;
}

function speak(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

function update(){
  document.querySelectorAll(".node").forEach(n => n.classList.remove("active"));

  const id = morse ? "node-" + morse : "node-start";
  const node = document.getElementById(id);
  if(node) node.classList.add("active");

  if(!morse){
    current.textContent = "Start";
    return;
  }

  const letter = morseMap[morse];
  current.textContent = letter ? `${morse} = ${letter}` : `${morse} = keep going`;
}

function finish(){
  const letter = morseMap[morse] || "?";
  current.textContent = "Letter: " + letter;
  speak(letter === "?" ? "Unknown" : letter);

  setTimeout(()=>{
    morse = "";
    update();
  },950);
}

function start(e){
  e.preventDefault();
  clearTimeout(timer);
  pressStart = Date.now();
  startTone();
}

function end(e){
  e.preventDefault();
  stopTone();

  const length = Date.now() - pressStart;
  morse += length < 300 ? "." : "-";

  if(morse.length > 4){
    morse = "";
    current.textContent = "Too long. Start again.";
    update();
    return;
  }

  update();
  timer = setTimeout(finish, 1100);
}

draw();
update();

soundBtn.addEventListener("click", enableSound);

btn.addEventListener("mousedown", start);
btn.addEventListener("mouseup", end);
btn.addEventListener("mouseleave", e => {
  if(pressStart) end(e);
});

btn.addEventListener("touchstart", start, {passive:false});
btn.addEventListener("touchend", end, {passive:false});
btn.addEventListener("touchcancel", end, {passive:false});
</script>

</body>
</html>
